<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的知识库</title>
<style>
/* ===== Reset ===== */
*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC",
               "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: #f5f3f0;
  color: #3a3a3a;
  line-height: 1.7;
  min-height: 100vh;
}

/* ===== Layout ===== */
.layout {
  display: flex;
  width: 90%;
  margin: 0 auto;
  min-height: calc(100vh - 110px);
}

/* ===== Header ===== */
.header {
  background: #fff;
  border-bottom: 1px solid #e8e4df;
  padding: 18px 32px 14px;
}
.header h1 {
  font-size: 1.3rem;
  font-weight: 700;
  color: #2a2a2a;
}
.header p {
  font-size: 0.8rem;
  color: #999;
  margin-top: 2px;
}

/* ===== Sidebar ===== */
.sidebar {
  width: 280px;
  flex-shrink: 0;
  background: #fafaf8;
  border-right: 1px solid #e8e4df;
  overflow-y: auto;
  max-height: calc(100vh - 70px);
  position: sticky;
  top: 0;
}
.sidebar-title {
  font-size: 0.72rem;
  font-weight: 600;
  color: #aaa;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 14px 14px 6px 12px;
}
.sidebar-search {
  padding: 8px 12px 12px;
}
.sidebar-search input {
  width: 100%;
  padding: 7px 12px;
  border: 1px solid #ddd8d0;
  border-radius: 6px;
  font-size: 0.82rem;
  outline: none;
  background: #fff;
  color: #3a3a3a;
}
.sidebar-search input::placeholder { color: #bbb; }
.sidebar-search input:focus { border-color: #aaa; }

/* 树状导航 */
.nav-tree { padding: 0 0 16px; }
.tree-item {
  display: flex;
  align-items: center;
  padding: 6px 12px 6px 12px;
  font-size: 0.85rem;
  color: #555;
  cursor: pointer;
  user-select: none;
  transition: background 0.12s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tree-item:hover { background: rgba(0,0,0,0.04); }
.tree-item.active {
  background: rgba(100,100,200,0.08);
  color: #333;
  font-weight: 600;
}
.tree-icon { margin-right: 7px; flex-shrink: 0; }
.tree-count {
  font-size: 0.72rem;
  color: #bbb;
  margin-left: auto;
  padding-left: 8px;
  flex-shrink: 0;
}

/* ===== Main ===== */
.main {
  flex: 1;
  min-width: 0;
  padding: 24px 28px 32px;
}
.toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 10px;
}
.stats { font-size: 0.82rem; color: #999; }
.stats strong { color: #555; }
.search-box {
  padding: 6px 12px;
  border: 1px solid #ddd8d0;
  border-radius: 6px;
  font-size: 0.84rem;
  width: 200px;
  outline: none;
  background: #fff;
}
.search-box:focus { border-color: #aaa; }

/* 文件分区标题 */
.section-title {
  font-size: 0.78rem;
  font-weight: 600;
  color: #aaa;
  letter-spacing: 0.04em;
  margin: 22px 0 8px;
  padding-bottom: 5px;
  border-bottom: 1px solid #e8e4df;
}
.section-title:first-child { margin-top: 0; }

/* 文件列表：手机单列，电脑三栏 */
.file-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
@media (min-width: 769px) {
  .file-list {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
  }
}
.file-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 16px;
  background: #fff;
  border: 1px solid #e8e4df;
  border-radius: 8px;
  text-decoration: none;
  color: #3a3a3a;
  transition: border-color 0.15s, box-shadow 0.15s;
  overflow: hidden;
}
.file-card:hover {
  border-color: #ccc4bc;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.file-icon {
  font-size: 1.1rem;
  flex-shrink: 0;
  width: 24px;
  text-align: center;
}
.file-info { flex: 1; min-width: 0; }
.file-name {
  font-size: 0.87rem;
  font-weight: 500;
  color: #2a2a2a;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.file-meta {
  font-size: 0.73rem;
  color: #aaa;
  margin-top: 1px;
}

/* ===== Footer ===== */
.footer {
  text-align: center;
  padding: 24px 16px;
  font-size: 0.76rem;
  color: #ccc;
  border-top: 1px solid #e8e4df;
  margin-top: 24px;
}

/* ===== Dark Mode ===== */
[data-unified-mode="fixed"] body,
[data-unified-mode="smart"] body { background: #0a0a0f !important; color: #b8bfc6 !important; }
[data-unified-mode="fixed"] .header,
[data-unified-mode="smart"] .header { background: #12121a !important; border-bottom-color: #2a2a3a !important; }
[data-unified-mode="fixed"] .header h1,
[data-unified-mode="smart"] .header h1 { color: #dedede !important; }
[data-unified-mode="fixed"] .header p,
[data-unified-mode="smart"] .header p { color: #666 !important; }
[data-unified-mode="fixed"] .sidebar,
[data-unified-mode="smart"] .sidebar { background: #12121a !important; border-right-color: #2a2a3a !important; }
[data-unified-mode="fixed"] .tree-item,
[data-unified-mode="smart"] .tree-item { color: #888 !important; }
[data-unified-mode="fixed"] .tree-item:hover,
[data-unified-mode="smart"] .tree-item:hover { background: rgba(255,255,255,0.04) !important; }
[data-unified-mode="fixed"] .tree-item.active,
[data-unified-mode="smart"] .tree-item.active { background: rgba(100,120,150,0.12) !important; color: #b8bfc6 !important; }
[data-unified-mode="fixed"] .tree-count,
[data-unified-mode="smart"] .tree-count { color: #555 !important; }
[data-unified-mode="fixed"] .sidebar-title,
[data-unified-mode="smart"] .sidebar-title { color: #555 !important; }
[data-unified-mode="fixed"] .file-card,
[data-unified-mode="smart"] .file-card { background: #1a1a28 !important; border-color: #2a2a3a !important; color: #b8bfc6 !important; }
[data-unified-mode="fixed"] .file-card:hover,
[data-unified-mode="smart"] .file-card:hover { border-color: #444 !important; box-shadow: 0 2px 8px rgba(0,0,0,0.3) !important; }
[data-unified-mode="fixed"] .file-name,
[data-unified-mode="smart"] .file-name { color: #dedede !important; }
[data-unified-mode="fixed"] .file-meta,
[data-unified-mode="smart"] .file-meta { color: #555 !important; }
[data-unified-mode="fixed"] .stats,
[data-unified-mode="smart"] .stats { color: #666 !important; }
[data-unified-mode="fixed"] .search-box,
[data-unified-mode="smart"] .search-box { background: #1a1a28 !important; border-color: #2a2a3a !important; color: #b8bfc6 !important; }
[data-unified-mode="fixed"] .section-title,
[data-unified-mode="smart"] .section-title { color: #555 !important; border-bottom-color: #2a2a3a !important; }
[data-unified-mode="fixed"] .footer,
[data-unified-mode="smart"] .footer { color: #444 !important; border-top-color: #2a2a3a !important; }

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .layout { width: 100%; }
  .header { padding: 14px 16px 10px; }
  .header h1 { font-size: 1.1rem; }
  .layout { flex-direction: column; }
  .sidebar {
    width: 100%;
    max-height: none;
    position: static;
    border-right: none;
    border-bottom: 1px solid #e8e4df;
    padding: 8px 0;
  }
  .main { padding: 16px; }
  .search-box { width: 100%; }
  .toolbar { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>📚 我的知识库</h1>
  <p id="headerInfo">加载中…</p>
</div>

<!-- Layout -->
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-title">文件夹</div>
    <div class="sidebar-search">
      <input type="text" placeholder="搜索文件…" id="searchInput" oninput="filterFiles()">
    </div>
    <nav class="nav-tree" id="folderTree"></nav>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="toolbar">
      <div class="stats" id="statsInfo"></div>
    </div>
    <div id="fileSections"></div>
  </main>

</div>

<!-- Footer -->
<div class="footer" id="footerInfo"></div>

<!-- Scripts -->
<script src="scripts/dark-mode-toggle.js"></script>
<script>
/* ===== 由脚本注入的站点数据 ===== */
const SITE_DATA = {"total": 13, "updateTime": "2026-06-14 07:32:35", "folders": [{"name": "scripts", "count": 3, "files": [{"name": "dark mode demo", "path": "./scripts/demo/dark-mode-demo.html", "ext": ".html", "type": "HTML", "subPath": "demo"}, {"name": "smart dark mode demo", "path": "./scripts/demo/smart-dark-mode-demo.html", "ext": ".html", "type": "HTML", "subPath": "demo"}, {"name": "深色模式自动注入 技术实现文档", "path": "./scripts/scriptsmd/深色模式自动注入-技术实现文档.html", "ext": ".html", "type": "HTML", "subPath": "scriptsmd"}]}, {"name": "科技数码相关", "count": 7, "files": [{"name": "目录", "path": "./科技数码相关/DOCS/目录.html", "ext": ".html", "type": "HTML", "subPath": "DOCS"}, {"name": "GKD 广告关闭规则编写完整指南", "path": "./科技数码相关/GKD 广告关闭基于AI规则编写/GKD 广告关闭规则编写完整指南.html", "ext": ".html", "type": "HTML", "subPath": "GKD 广告关闭基于AI规则编写"}, {"name": "Openlist安卓win部署及应用", "path": "./科技数码相关/DOCS/Openlist安卓win部署及应用.pdf", "ext": ".pdf", "type": "PDF", "subPath": "DOCS"}, {"name": "基于vps搭建个人节点", "path": "./科技数码相关/节点搭建/基于vps搭建个人节点.html", "ext": ".html", "type": "HTML", "subPath": "节点搭建"}, {"name": "存储不足及优化", "path": "./科技数码相关/DOCS/存储不足及优化.pdf", "ext": ".pdf", "type": "PDF", "subPath": "DOCS"}, {"name": "极限压缩终极指南：格式、算法与实战全解", "path": "./科技数码相关/极限压缩终极指南：格式、算法与实战全解.html", "ext": ".html", "type": "HTML", "subPath": ""}, {"name": "🚀 给纯小白的浏览器完整指南（从零到顺手）", "path": "./科技数码相关/浏览器指南/🚀 给纯小白的浏览器完整指南（从零到顺手）.html", "ext": ".html", "type": "HTML", "subPath": "浏览器指南"}]}, {"name": "personal", "count": 3, "files": [{"name": "Git 命令大全", "path": "./personal/Git 命令大全.html", "ext": ".html", "type": "HTML", "subPath": ""}, {"name": "su", "path": "./personal/su.html", "ext": ".html", "type": "HTML", "subPath": ""}, {"name": "后记", "path": "./personal/后记.html", "ext": ".html", "type": "HTML", "subPath": ""}]}]};

/* ===== 图标映射 ===== */
const ICONS = { ".html": "🌐", ".htm": "🌐", ".pdf": "📕" };

/* ===== 渲染左侧文件夹树 ===== */
function renderTree() {
  const tree = document.getElementById("folderTree");
  const total = SITE_DATA.total;

  // "全部文件" 入口
  let html = `<div class="tree-item active" data-folder="all" onclick="filterByFolder('all')">`
    + `<span class="tree-icon">📂</span>`
    + `<span>全部文件</span>`
    + `<span class="tree-count">(${total})</span>`
    + `</div>`;

  // 顶级文件夹
  SITE_DATA.folders.forEach(f => {
    html += `<div class="tree-item" data-folder="${f.name}" onclick="filterByFolder('${f.name}')">`
      + `<span class="tree-icon">📁</span>`
      + `<span>${f.name}</span>`
      + `<span class="tree-count">(${f.count})</span>`
      + `</div>`;
  });

  tree.innerHTML = html;
}

/* ===== 渲染右侧文件卡片 ===== */
function renderFiles() {
  const container = document.getElementById("fileSections");
  let html = "";

  SITE_DATA.folders.forEach(folder => {
    html += `<div class="file-section" data-folder="${folder.name}">`;
    html += `<div class="section-title">${folder.name}</div>`;
    html += `<div class="file-list">`;

    folder.files.forEach(f => {
      const icon = ICONS[f.ext] || "📄";
      const displayName = f.name;
      html += `<a class="file-card" data-name="${f.name.toLowerCase()}" href="${f.path}" target="_blank">`
        + `<span class="file-icon">${icon}</span>`
        + `<div class="file-info">`
        + `<div class="file-name">${displayName}</div>`
        + `<div class="file-meta">${f.type}</div>`
        + `</div></a>`;
    });

    html += `</div></div>`;
  });

  container.innerHTML = html;
}

/* ===== 填充 Header/Footer ===== */
function renderInfo() {
  const d = SITE_DATA;
  document.getElementById("headerInfo").innerHTML =
    `索引更新：${d.updateTime}　共 <strong>${d.total}</strong> 篇`;
  document.getElementById("statsInfo").innerHTML =
    `共 <strong>${d.total}</strong> 篇　文件夹 <strong>${d.folders.length}</strong> 个`;
  document.getElementById("footerInfo").textContent =
    `Powered by generate_index_html.py · ${d.updateTime}`;
}

/* ===== 文件夹过滤 ===== */
function filterByFolder(name) {
  document.querySelectorAll(".tree-item").forEach(t =>
    t.classList.toggle("active", t.dataset.folder === name)
  );
  document.querySelectorAll(".file-section").forEach(s => {
    s.style.display = (name === "all" || s.dataset.folder === name) ? "" : "none";
  });
}

/* ===== 搜索过滤 ===== */
function filterFiles() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  document.querySelectorAll(".file-card").forEach(c => {
    c.style.display = c.dataset.name.includes(q) ? "" : "none";
  });
}

/* ===== 初始化 ===== */
renderTree();
renderFiles();
renderInfo();
</script>


<!-- __DARK_MODE_INJECTED__ -->
<script src="scripts/dark-mode-toggle.js"></script>
</body>
</html>
