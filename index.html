<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的知识库</title>
<link rel="stylesheet" href="./scripts/css/home.css">
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1 id="headerTitle">📚 我的知识库</h1>
    <p id="headerInfo">加载中…</p>
  </div>

<!-- Layout -->
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-title">文件夹</div>
    <div class="sidebar-search">
      <input type="text" placeholder="搜索文件…" id="searchInput" oninput="filterFiles()">
    </div>
    <nav class="nav-tree" id="folderTree"></nav>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="toolbar">
    </div>
    <div id="fileSections"></div>
  </main>

</div>

<!-- Footer -->
<div class="footer" id="footerInfo"></div>

<!-- Scripts -->
<script>
/* ===== 由脚本注入的站点数据 ===== */
const SITE_DATA = {"total": 14, "updateTime": "2026-06-14 15:57:47", "folders": [{"name": "scripts", "count": 3, "files": [{"name": "dark mode demo", "path": "./scripts/demo/dark-mode-demo.html", "ext": ".html", "type": "HTML", "subPath": "demo"}, {"name": "smart dark mode demo", "path": "./scripts/demo/smart-dark-mode-demo.html", "ext": ".html", "type": "HTML", "subPath": "demo"}, {"name": "深色模式自动注入 技术实现文档", "path": "./scripts/scriptsmd/深色模式自动注入-技术实现文档.html", "ext": ".html", "type": "HTML", "subPath": "scriptsmd"}], "portals": []}, {"name": "科技数码相关", "count": 8, "files": [{"name": "目录", "path": "./科技数码相关/DOCS/目录.html", "ext": ".html", "type": "HTML", "subPath": "DOCS"}, {"name": "GKD 广告关闭规则编写完整指南", "path": "./科技数码相关/GKD 广告关闭基于AI规则编写/GKD 广告关闭规则编写完整指南.html", "ext": ".html", "type": "HTML", "subPath": "GKD 广告关闭基于AI规则编写"}, {"name": "Openlist安卓win部署及应用", "path": "./科技数码相关/DOCS/Openlist安卓win部署及应用.pdf", "ext": ".pdf", "type": "PDF", "subPath": "DOCS"}, {"name": "基于vps搭建个人节点", "path": "./科技数码相关/节点搭建/基于vps搭建个人节点.html", "ext": ".html", "type": "HTML", "subPath": "节点搭建"}, {"name": "存储不足及优化", "path": "./科技数码相关/DOCS/存储不足及优化.pdf", "ext": ".pdf", "type": "PDF", "subPath": "DOCS"}, {"name": "极限压缩终极指南：格式、算法与实战全解", "path": "./科技数码相关/极限压缩终极指南：格式、算法与实战全解.html", "ext": ".html", "type": "HTML", "subPath": ""}, {"name": "🚀 给纯小白的浏览器完整指南（从零到顺手）", "path": "./科技数码相关/浏览器指南/🚀 给纯小白的浏览器完整指南（从零到顺手）.html", "ext": ".html", "type": "HTML", "subPath": "浏览器指南"}], "portals": [{"name": "小米", "path": "科技数码相关/小米", "count": 1, "files": [{"name": "666", "path": "./科技数码相关/小米/666.pdf", "ext": ".pdf", "type": "PDF", "subPath": "小米"}]}]}, {"name": "personal", "count": 3, "files": [{"name": "Git 命令大全", "path": "./personal/Git 命令大全.html", "ext": ".html", "type": "HTML", "subPath": ""}, {"name": "su", "path": "./personal/su.html", "ext": ".html", "type": "HTML", "subPath": ""}, {"name": "后记", "path": "./personal/后记.html", "ext": ".html", "type": "HTML", "subPath": ""}], "portals": []}]};

/* ===== 图标映射 ===== */
const ICONS = { ".html": "🌐", ".htm": "🌐", ".pdf": "📕" };

/* ===== 渲染左侧文件夹树 ===== */
function renderTree() {
  const tree = document.getElementById("folderTree");
  const total = SITE_DATA.total;

  // "全部文件" 入口
  let html = `<div class="tree-item active" data-folder="all" onclick="filterByFolder('all')">`
    + `<span class="tree-icon">📂</span>`
    + `<span>全部文件</span>`
    + `<span class="tree-count">(${total})</span>`
    + `</div>`;

  // 顶级文件夹
  SITE_DATA.folders.forEach(f => {
    html += `<div class="tree-item" data-folder="${f.name}" onclick="filterByFolder('${f.name}')">`
      + `<span class="tree-icon">📁</span>`
      + `<span>${f.name}</span>`
      + `<span class="tree-count">(${f.count})</span>`
      + `</div>`;
  });

  tree.innerHTML = html;
}

/* ===== 渲染右侧文件卡片（懒加载 + 门户子文件夹） ===== */
const BATCH_SIZE = 30;

function renderFiles() {
  const container = document.getElementById("fileSections");
  container.innerHTML = "";

  // 创建所有文件夹的占位 section + 门户卡片
  const folderLists = {};
  SITE_DATA.folders.forEach(folder => {
    const section = document.createElement("div");
    section.className = "file-section";
    section.dataset.folder = folder.name;

    // 标题
    const title = document.createElement("div");
    title.className = "section-title";
    title.textContent = folder.name;
    section.appendChild(title);

    // 文件网格（门户卡片也放在里面，统一 3 栏宽度）
    const list = document.createElement("div");
    list.className = "file-list";
    section.appendChild(list);
    folderLists[folder.name] = list;

    // 门户子文件夹卡片（插入网格内）
    if (folder.portals && folder.portals.length > 0) {
      folder.portals.forEach(portal => {
        const portalCard = document.createElement("div");
        portalCard.className = "file-card portal-card";
        portalCard.innerHTML = `<span class="file-icon">📁</span>`
          + `<div class="file-info">`
          + `<div class="file-name">${portal.name}</div>`
          + `<div class="file-meta">${portal.count} 个文件</div>`
          + `</div>`;

        const portalList = document.createElement("div");
        portalList.className = "file-list portal-file-list";
        portalList.style.display = "none";

        portalCard.addEventListener("click", () => {
          const show = portalList.style.display === "none";
          portalList.style.display = show ? "" : "none";
          portalCard.classList.toggle("portal-open", show);
        });

        list.appendChild(portalCard);
        section.appendChild(portalList);
        folderLists[portal.path] = portalList;
      });
    }

    container.appendChild(section);
  });

  // 滚动哨兵
  const sentinel = document.createElement("div");
  sentinel.style.cssText = "height:1px;width:100%";
  container.appendChild(sentinel);

  // 扁平化所有文件：直接文件 + 门户内文件
  const allFiles = [];
  SITE_DATA.folders.forEach(folder => {
    folder.files.forEach(f => allFiles.push({ target: folder.name, file: f }));
    if (folder.portals) {
      folder.portals.forEach(portal => {
        portal.files.forEach(f => allFiles.push({ target: portal.path, file: f }));
      });
    }
  });

  let idx = 0;

  function loadBatch() {
    const end = Math.min(idx + BATCH_SIZE, allFiles.length);
    for (let i = idx; i < end; i++) {
      const { target, file: f } = allFiles[i];
      const icon = ICONS[f.ext] || "📄";
      const card = document.createElement("a");
      card.className = "file-card";
      card.dataset.name = f.name.toLowerCase();
      card.href = f.path;
      card.target = "_blank";
      card.innerHTML = `<span class="file-icon">${icon}</span>`
        + `<div class="file-info">`
        + `<div class="file-name">${f.name}</div>`
        + `<div class="file-meta">${f.type}</div>`
        + `</div>`;
      folderLists[target].appendChild(card);
    }
    idx = end;
    if (idx >= allFiles.length) {
      observer.unobserve(sentinel);
      sentinel.remove();
    }
  }

  const observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) loadBatch();
  }, { rootMargin: "200px" });
  observer.observe(sentinel);

  loadBatch();
}

/* ===== 填充 Header/Footer ===== */
function renderInfo() {
  const d = SITE_DATA;
  document.getElementById("headerInfo").innerHTML =
    `索引更新：${d.updateTime}　共 <strong>${d.total}</strong> 篇　主文件夹 <strong>${d.folders.length}</strong> 个`;
  document.getElementById("footerInfo").textContent =
    `Powered by generate_index_html.py · ${d.updateTime}`;
}

/* ===== 文件夹过滤 ===== */
function filterByFolder(name) {
  document.querySelectorAll(".tree-item").forEach(t =>
    t.classList.toggle("active", t.dataset.folder === name)
  );
  document.querySelectorAll(".file-section").forEach(s => {
    s.style.display = (name === "all" || s.dataset.folder === name) ? "" : "none";
  });
}

/* ===== 搜索过滤 ===== */
function filterFiles() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  document.querySelectorAll(".file-card").forEach(c => {
    c.style.display = c.dataset.name.includes(q) ? "" : "none";
  });
}

/* ===== 初始化 ===== */
renderTree();
renderFiles();
renderInfo();
</script>


<!-- __DARK_MODE_INJECTED__ -->
<script src="scripts/dark-mode-toggle.js"></script>
</body>
</html>
