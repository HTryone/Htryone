<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的知识库</title>
<link rel="stylesheet" href="./scripts/css/home.css">
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1 id="headerTitle">📚 我的知识库</h1>
    <p id="headerInfo">加载中…</p>
  </div>

<!-- Layout -->
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-title">文件夹</div>
    <div class="sidebar-search">
      <input type="text" placeholder="搜索文件…" id="searchInput" oninput="filterFiles()">
    </div>
    <nav class="nav-tree" id="folderTree"></nav>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="toolbar">
    </div>
    <div id="fileSections"></div>
  </main>

</div>

<!-- Footer -->
<div class="footer" id="footerInfo"></div>

<!-- Scripts -->
<script>
/* ===== 由脚本注入的站点数据 ===== */
const SITE_DATA = {{SITE_DATA}};

/* ===== 图标映射 ===== */
const ICONS = { ".html": "🌐", ".htm": "🌐", ".pdf": "📕" };

/* ===== 渲染左侧文件夹树 ===== */
function renderTree() {
  const tree = document.getElementById("folderTree");
  const total = SITE_DATA.total;

  // "全部文件" 入口
  let html = `<div class="tree-item active" data-folder="all" onclick="filterByFolder('all')">`
    + `<span class="tree-icon">📂</span>`
    + `<span>全部文件</span>`
    + `<span class="tree-count">(${total})</span>`
    + `</div>`;

  // 顶级文件夹
  SITE_DATA.folders.forEach(f => {
    html += `<div class="tree-item" data-folder="${f.name}" onclick="filterByFolder('${f.name}')">`
      + `<span class="tree-icon">📁</span>`
      + `<span>${f.name}</span>`
      + `<span class="tree-count">(${f.count})</span>`
      + `</div>`;
  });

  tree.innerHTML = html;
}

/* ===== 渲染右侧文件卡片（懒加载 + 门户子文件夹） ===== */
const BATCH_SIZE = 30;

function renderFiles() {
  const container = document.getElementById("fileSections");
  container.innerHTML = "";

  // 创建所有文件夹的占位 section + 门户卡片
  const folderLists = {};
  SITE_DATA.folders.forEach(folder => {
    const section = document.createElement("div");
    section.className = "file-section";
    section.dataset.folder = folder.name;

    // 标题
    const title = document.createElement("div");
    title.className = "section-title";
    title.textContent = folder.name;
    section.appendChild(title);

    // 文件网格（门户卡片也放在里面，统一 3 栏宽度）
    const list = document.createElement("div");
    list.className = "file-list";
    section.appendChild(list);
    folderLists[folder.name] = list;

    // 门户子文件夹卡片（点击跳转子页面）
    if (folder.portals && folder.portals.length > 0) {
      folder.portals.forEach(portal => {
        const portalCard = document.createElement("a");
        portalCard.className = "file-card portal-card";
        portalCard.href = "./" + portal.path + "/page2.html";
        portalCard.innerHTML = `<span class="file-icon">📁</span>`
          + `<div class="file-info">`
          + `<div class="file-name">${portal.name}</div>`
          + `<div class="file-meta">${portal.count} 个文件</div>`
          + `</div>`;
        list.appendChild(portalCard);
      });
    }

    container.appendChild(section);
  });

  // 滚动哨兵
  const sentinel = document.createElement("div");
  sentinel.style.cssText = "height:1px;width:100%";
  container.appendChild(sentinel);

  // 扁平化所有直接文件（门户内文件在独立子页面展示）
  const allFiles = [];
  SITE_DATA.folders.forEach(folder => {
    folder.files.forEach(f => allFiles.push({ target: folder.name, file: f }));
  });

  let idx = 0;

  function loadBatch() {
    const end = Math.min(idx + BATCH_SIZE, allFiles.length);
    for (let i = idx; i < end; i++) {
      const { target, file: f } = allFiles[i];
      const icon = ICONS[f.ext] || "📄";
      const card = document.createElement("a");
      card.className = "file-card";
      card.dataset.name = f.name.toLowerCase();
      card.href = f.path;
      card.target = "_blank";
      card.innerHTML = `<span class="file-icon">${icon}</span>`
        + `<div class="file-info">`
        + `<div class="file-name">${f.name}</div>`
        + `<div class="file-meta">${f.type}</div>`
        + `</div>`;
      folderLists[target].appendChild(card);
    }
    idx = end;
    if (idx >= allFiles.length) {
      observer.unobserve(sentinel);
      sentinel.remove();
    }
  }

  const observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) loadBatch();
  }, { rootMargin: "200px" });
  observer.observe(sentinel);

  loadBatch();
}

/* ===== 填充 Header/Footer ===== */
function renderInfo() {
  const d = SITE_DATA;
  document.getElementById("headerInfo").innerHTML =
    `索引更新：${d.updateTime}　共 <strong>${d.total}</strong> 篇　主文件夹 <strong>${d.folders.length}</strong> 个`;
  document.getElementById("footerInfo").textContent =
    `Powered by generate_index_html.py · ${d.updateTime}`;
}

/* ===== 文件夹过滤 ===== */
function filterByFolder(name) {
  document.querySelectorAll(".tree-item").forEach(t =>
    t.classList.toggle("active", t.dataset.folder === name)
  );
  document.querySelectorAll(".file-section").forEach(s => {
    s.style.display = (name === "all" || s.dataset.folder === name) ? "" : "none";
  });
}

/* ===== 搜索过滤 ===== */
function filterFiles() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  document.querySelectorAll(".file-card").forEach(c => {
    c.style.display = c.dataset.name.includes(q) ? "" : "none";
  });
}

/* ===== 初始化 ===== */
renderTree();
renderFiles();
renderInfo();
</script>


<!-- __DARK_MODE_INJECTED__ -->
<script src="scripts/dark-mode-toggle.js"></script>
</body>
</html>
