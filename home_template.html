<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的知识库</title>
<link rel="stylesheet" href="./scripts/css/home.css">
<link rel="stylesheet" href="./scripts/css/home-dark.css">
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1 id="headerTitle">📚 我的知识库</h1>
    <p id="headerInfo">加载中…</p>
  </div>

<!-- Layout -->
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-title">文件夹</div>
    <div class="sidebar-search">
      <input type="text" placeholder="搜索文件…" id="searchInput" oninput="filterFiles()">
    </div>
    <nav class="nav-tree" id="folderTree"></nav>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="toolbar">
      <div class="tab-btns">
        <button class="tab-btn active" data-tab="all" onclick="switchTab('all')">全部文件</button>
        <button class="tab-btn" data-tab="recent" onclick="switchTab('recent')">最近更新</button>
      </div>
    </div>
    <div id="tabAll" class="file-section">
      <div id="fileSections"></div>
    </div>
    <div id="tabRecent" class="file-section" style="display:none;">
      <div class="file-list" id="recentList"></div>
    </div>
  </main>

</div>

<!-- Footer -->
<div class="footer" id="footerInfo"></div>

<!-- Scripts -->
<script src="./scripts/data/site_data.js"></script>
<script>
/* ===== 图标映射 ===== */
const ICONS = { ".html": "🌐", ".htm": "🌐", ".pdf": "📕" };

/* ===== 渲染左侧文件夹树 ===== */
function renderTree() {
  const tree = document.getElementById("folderTree");
  const total = SITE_DATA.total;

  // "全部文件" 入口
  let html = `<div class="tree-item active" data-folder="all" onclick="filterByFolder('all')">`
    + `<span class="tree-icon">📂</span>`
    + `<span>全部文件</span>`
    + `<span class="tree-count">(${total})</span>`
    + `</div>`;

  // 顶级文件夹
  SITE_DATA.folders.forEach(f => {
    html += `<div class="tree-item" data-folder="${f.name}" onclick="filterByFolder('${f.name}')">`
      + `<span class="tree-icon">📁</span>`
      + `<span>${f.name}</span>`
      + `<span class="tree-count">(${f.count})</span>`
      + `</div>`;
  });

  tree.innerHTML = html;
}

/* ===== 搜索索引（全量，含门户内部文件） ===== */
let SEARCH_INDEX = [];

function buildSearchIndex() {
  const idx = [];
  SITE_DATA.folders.forEach(folder => {
    // 直接文件
    folder.files.forEach(f => idx.push({ ...f, folder: folder.name, _kind: "file" }));
    // 门户子文件夹卡片 + 门户内部文件
    if (folder.portals) {
      folder.portals.forEach(p => {
        idx.push({ name: p.name, path: "./" + p.path + "/page2.html", ext: "", type: "文件夹", folder: folder.name, _kind: "portal", _count: p.count });
        p.files.forEach(f => idx.push({ ...f, folder: folder.name, _kind: "portal-file", _portalName: p.name }));
      });
    }
  });
  SEARCH_INDEX = idx;
}

/* ===== 渲染右侧文件卡片（懒加载 + 门户子文件夹） ===== */
const BATCH_SIZE = 30;

function renderFiles() {
  const container = document.getElementById("fileSections");
  container.innerHTML = "";

  // 创建所有文件夹的占位 section + 门户卡片
  const folderLists = {};
  SITE_DATA.folders.forEach(folder => {
    const section = document.createElement("div");
    section.className = "file-section";
    section.dataset.folder = folder.name;

    // 标题
    const title = document.createElement("div");
    title.className = "section-title";
    title.textContent = folder.name;
    section.appendChild(title);

    // 文件网格（门户卡片也放在里面，统一 3 栏宽度）
    const list = document.createElement("div");
    list.className = "file-list";
    section.appendChild(list);
    folderLists[folder.name] = list;

    // 门户子文件夹卡片（点击跳转子页面）
    if (folder.portals && folder.portals.length > 0) {
      folder.portals.forEach(portal => {
        const portalCard = document.createElement("a");
        portalCard.className = "file-card portal-card";
        portalCard.href = "./" + portal.path + "/page2.html";
        portalCard.innerHTML = `<span class="file-icon">📁</span>`
          + `<div class="file-info">`
          + `<div class="file-name">${portal.name}</div>`
          + `<div class="file-meta">${portal.count} 个文件</div>`
          + `</div>`;
        list.appendChild(portalCard);
      });
    }

    container.appendChild(section);
  });

  // 滚动哨兵
  const sentinel = document.createElement("div");
  sentinel.style.cssText = "height:1px;width:100%";
  container.appendChild(sentinel);

  // 扁平化所有直接文件（门户内文件在独立子页面展示）
  const allFiles = [];
  SITE_DATA.folders.forEach(folder => {
    folder.files.forEach(f => allFiles.push({ target: folder.name, file: f }));
  });

  let idx = 0;

  function loadBatch() {
    const end = Math.min(idx + BATCH_SIZE, allFiles.length);
    for (let i = idx; i < end; i++) {
      const { target, file: f } = allFiles[i];
      const icon = ICONS[f.ext] || "📄";
      const card = document.createElement("a");
      card.className = "file-card";
      card.dataset.name = f.name.toLowerCase();
      card.href = f.path;
      card.target = "_blank";
      card.innerHTML = `<span class="file-icon">${icon}</span>`
        + `<div class="file-info">`
        + `<div class="file-name">${f.name}</div>`
        + `<div class="file-meta">${f.type}</div>`
        + `</div>`;
      folderLists[target].appendChild(card);
    }
    idx = end;
    if (idx >= allFiles.length) {
      observer.unobserve(sentinel);
      sentinel.remove();
    }
  }

  const observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) loadBatch();
  }, { rootMargin: "200px" });
  observer.observe(sentinel);

  loadBatch();
}

/* ===== 填充 Header/Footer ===== */
function renderInfo() {
  const d = SITE_DATA;
  document.getElementById("headerInfo").innerHTML =
    `索引更新：${d.updateTime}　共 <strong>${d.total}</strong> 篇　主文件夹 <strong>${d.folders.length}</strong> 个`;
  document.getElementById("footerInfo").textContent =
    `Powered by generate_index_html.py · ${d.updateTime}`;
}

/* ===== 文件夹过滤 ===== */
function filterByFolder(name) {
  document.querySelectorAll(".tree-item").forEach(t =>
    t.classList.toggle("active", t.dataset.folder === name)
  );
  document.querySelectorAll(".file-section").forEach(s => {
    s.style.display = (name === "all" || s.dataset.folder === name) ? "" : "none";
  });
}

/* ===== 搜索过滤（基于全量索引） ===== */
function filterFiles() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  const container = document.getElementById("fileSections");

  // 空搜索 → 恢复懒加载视图
  if (!q) {
    renderFiles();
    return;
  }

  container.innerHTML = "";
  const matches = SEARCH_INDEX.filter(f => f.name.toLowerCase().includes(q));

  if (matches.length === 0) {
    container.innerHTML = '<div class="search-empty">未找到匹配的文件</div>';
    return;
  }

  // 按文件夹分组
  const groups = {};
  matches.forEach(f => {
    if (!groups[f.folder]) groups[f.folder] = [];
    groups[f.folder].push(f);
  });

  for (const [fname, files] of Object.entries(groups)) {
    const section = document.createElement("div");
    section.className = "file-section";
    section.innerHTML = `<div class="section-title">${fname}</div>`;

    const list = document.createElement("div");
    list.className = "file-list";

    files.forEach(f => {
      const card = document.createElement("a");
      card.className = "file-card";
      card.href = f.path;
      card.target = "_blank";

      if (f._kind === "portal") {
        card.innerHTML = `<span class="file-icon">📁</span>`
          + `<div class="file-info">`
          + `<div class="file-name">${f.name}</div>`
          + `<div class="file-meta">${f._count} 个文件</div></div>`;
      } else if (f._kind === "portal-file") {
        card.innerHTML = `<span class="file-icon">${ICONS[f.ext] || "📄"}</span>`
          + `<div class="file-info">`
          + `<div class="file-name">${f.name}</div>`
          + `<div class="file-meta">📁 ${f._portalName} · ${f.type}</div></div>`;
      } else {
        card.innerHTML = `<span class="file-icon">${ICONS[f.ext] || "📄"}</span>`
          + `<div class="file-info">`
          + `<div class="file-name">${f.name}</div>`
          + `<div class="file-meta">${f.type}</div></div>`;
      }

      list.appendChild(card);
    });

    section.appendChild(list);
    container.appendChild(section);
  }
}

/* ===== Tab 切换 ===== */
function switchTab(tab) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  document.getElementById("tabAll").style.display = tab === "all" ? "" : "none";
  document.getElementById("tabRecent").style.display = tab === "recent" ? "" : "none";
  if (tab === "recent") renderRecent();
}

/* ===== 渲染最近更新（取 SITE_DATA.recent） ===== */
function renderRecent() {
  const list = document.getElementById("recentList");
  if (list.dataset.rendered) return;   // 只渲染一次
  list.dataset.rendered = "1";

  const recent = SITE_DATA.recent || [];
  if (recent.length === 0) {
    list.innerHTML = '<div class="search-empty">暂无最近更新文件</div>';
    return;
  }

  const BATCH = 10;
  let idx = 0;

  function fmt(mtime) {
    if (!mtime) return "";
    const d = new Date(mtime * 1000);
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  }

  function load() {
    const end = Math.min(idx + BATCH, recent.length);
    for (let i = idx; i < end; i++) {
      const f = recent[i];
      const icon = ICONS[f.ext] || "📄";
      const card = document.createElement("a");
      card.className = "file-card";
      card.href = f.path;
      card.target = "_blank";
      card.innerHTML = `<span class="file-icon">${icon}</span>`
        + `<div class="file-info">`
        + `<div class="file-name">${f.name}</div>`
        + `<div class="file-meta">📁 ${f.folder}　${f.type}　${fmt(f.mtime)}</div>`
        + `</div>`;
      list.appendChild(card);
    }
    idx = end;
    if (idx < recent.length) requestAnimationFrame(load);
  }
  load();
}

/* ===== 初始化 ===== */
buildSearchIndex();
renderTree();
renderFiles();
renderInfo();
</script>


<!-- __DARK_MODE_INJECTED__ -->
<script src="scripts/dark-mode-toggle.js"></script>

<!-- __IMAGE_ZOOM_INJECTED__ -->
<script src="scripts/image-zoom.js"></script>
</body>
</html>
